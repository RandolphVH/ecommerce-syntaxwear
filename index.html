<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Tênis e Sneakers Online</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">

  <link rel="stylesheet" href="./css/layout.css">
</head>

<body>

  <header class="site-header">
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
        <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <nav class="nav-secondary" aria-label="Ações do usuário">
      <ul>
        <li><a href="#">Nossas lojas</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Perfil</a></li>
        <li><a href="#">Ajuda</a></li>
        <li><a href="#">Carrinho</a></li>
      </ul>
    </nav>
    
    <nav class="nav-right" aria-label="Acesso rápidas">
      <ul>
        <li><a href="#">Nossas lojas</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#"><img src="./images/icons/user.svg" alt="Perfil"></a></li>
        <li><a href="#"><img src="./images/icons/help.svg" alt="Ajuda"></a></li>
        <li><a href="#"><img src="./images/icons/bag.svg" alt="Carrinho"></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" aria-label="Seção hero">
      <div class="hero__content"></div>
    </section>

    <section class="categories" aria-labelledby="categories-title">
      <h2 id="categories-title">Categorias de tênis</h2>
      <div class="categories__list"></div>
    </section>

    <section class="featured-products" aria-labelledby="products-title">
      <h2 id="products-title">Produtos em destaque</h2>
      <div class="product-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer__contact"></div>
    <div class="footer__links"></div>
  </footer>
</body>

</html>
