<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Ecommerce</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="#">SyntaxWear</a>
    <nav class="site-nav" aria-label="Navegação principal">
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Tênis</a></li>
        <li><a href="#">Categorias</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" aria-label="Seção hero">
      <div class="hero__content"></div>
    </section>

    <section class="categories" aria-labelledby="categories-title">
      <h2 id="categories-title">Categorias de tênis</h2>
      <div class="categories__list"></div>
    </section>

    <section class="featured-products" aria-labelledby="products-title">
      <h2 id="products-title">Produtos em destaque</h2>
      <div class="product-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer__contact"></div>
    <div class="footer__links"></div>
  </footer>
</body>
</html>
